<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clock Timer</title>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            width: 100%;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0f0f1a;
            color: #e2e8f0;
            overflow-x: hidden;
            overflow-y: auto;
        }

        #app {
            max-width: 520px;
            margin: 0 auto;
            padding: 24px 16px 32px;
            min-height: 100%;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Header */
        .header {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-icon {
            font-size: 28px;
            line-height: 1;
        }

        .header-title {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 0.02em;
            background: linear-gradient(135deg, #a78bfa 0%, #60a5fa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Tick display */
        .tick-display {
            background: #1a1a2e;
            border: 1px solid rgba(167, 139, 250, 0.2);
            border-radius: 16px;
            padding: 32px 24px 24px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .tick-display::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, #a78bfa, #60a5fa, transparent);
        }

        .tick-counter {
            font-size: 72px;
            font-weight: 800;
            line-height: 1;
            font-variant-numeric: tabular-nums;
            letter-spacing: -2px;
            margin-bottom: 4px;
            transition: transform 0.1s ease;
        }

        .tick-counter.pulse {
            animation: tick-pulse 0.3s ease-out;
        }

        @keyframes tick-pulse {
            0% { transform: scale(1); }
            40% { transform: scale(1.06); }
            100% { transform: scale(1); }
        }

        .tick-of {
            font-size: 16px;
            color: #6b7280;
            margin-bottom: 24px;
            font-weight: 500;
        }

        /* Progress bar */
        .progress-container {
            margin-bottom: 12px;
        }

        .progress-track {
            height: 12px;
            background: rgba(255, 255, 255, 0.07);
            border-radius: 6px;
            overflow: hidden;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            border-radius: 6px;
            background: linear-gradient(90deg, #7c3aed, #6366f1, #3b82f6);
            transition: width 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            width: 0%;
            position: relative;
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.25) 50%, transparent 100%);
            animation: shimmer 2s infinite;
            display: none;
        }

        .progress-fill.active::after {
            display: block;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .progress-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 8px;
        }

        .progress-pct {
            font-size: 13px;
            font-weight: 600;
            color: #a78bfa;
        }

        .progress-message {
            font-size: 13px;
            color: #6b7280;
            font-style: italic;
            max-width: 240px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* Status dot */
        .status-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 4px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #374151;
            transition: background 0.3s ease;
        }

        .status-dot.idle { background: #374151; }
        .status-dot.running {
            background: #10b981;
            box-shadow: 0 0 6px rgba(16, 185, 129, 0.6);
            animation: blink 1s ease-in-out infinite;
        }
        .status-dot.done { background: #6366f1; }
        .status-dot.error { background: #ef4444; }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .status-label {
            font-size: 12px;
            font-weight: 500;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        /* Controls */
        .controls-card {
            background: #1a1a2e;
            border: 1px solid rgba(255, 255, 255, 0.07);
            border-radius: 12px;
            padding: 20px;
        }

        .controls-title {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #4b5563;
            margin-bottom: 16px;
        }

        .control-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 16px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .control-label {
            font-size: 12px;
            font-weight: 500;
            color: #9ca3af;
        }

        .control-hint {
            font-size: 10px;
            color: #4b5563;
        }

        .control-input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #e2e8f0;
            font-size: 15px;
            font-weight: 600;
            padding: 10px 12px;
            width: 100%;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            -moz-appearance: textfield;
        }

        .control-input::-webkit-outer-spin-button,
        .control-input::-webkit-inner-spin-button {
            -webkit-appearance: none;
        }

        .control-input:focus {
            border-color: #7c3aed;
            box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.15);
        }

        .control-input:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Start/Stop button */
        .start-btn {
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 0.03em;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .start-btn.ready {
            background: linear-gradient(135deg, #7c3aed, #3b82f6);
            color: white;
            box-shadow: 0 4px 16px rgba(124, 58, 237, 0.3);
        }

        .start-btn.ready:hover:not(:disabled) {
            box-shadow: 0 6px 24px rgba(124, 58, 237, 0.5);
            transform: translateY(-1px);
        }

        .start-btn.running {
            background: linear-gradient(135deg, #ef4444, #f97316);
            color: white;
            box-shadow: 0 4px 16px rgba(239, 68, 68, 0.3);
        }

        .start-btn.running:hover:not(:disabled) {
            box-shadow: 0 6px 24px rgba(239, 68, 68, 0.5);
            transform: translateY(-1px);
        }

        .start-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
        }

        .start-btn:active:not(:disabled) {
            transform: translateY(0) !important;
        }

        /* Tick log */
        .log-card {
            background: #1a1a2e;
            border: 1px solid rgba(255, 255, 255, 0.07);
            border-radius: 12px;
            overflow: hidden;
        }

        .log-header {
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .log-title {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #4b5563;
        }

        .log-clear {
            background: none;
            border: none;
            color: #4b5563;
            font-size: 11px;
            cursor: pointer;
            padding: 2px 6px;
            border-radius: 4px;
            transition: color 0.2s, background 0.2s;
        }

        .log-clear:hover {
            color: #9ca3af;
            background: rgba(255, 255, 255, 0.05);
        }

        .log-list {
            max-height: 180px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: rgba(255,255,255,0.1) transparent;
        }

        .log-list::-webkit-scrollbar {
            width: 4px;
        }

        .log-list::-webkit-scrollbar-track {
            background: transparent;
        }

        .log-list::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
        }

        .log-empty {
            padding: 20px 16px;
            text-align: center;
            color: #374151;
            font-size: 13px;
            font-style: italic;
        }

        .log-entry {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 8px 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            animation: slide-in 0.2s ease-out;
        }

        @keyframes slide-in {
            from {
                opacity: 0;
                transform: translateX(-8px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .log-entry:last-child {
            border-bottom: none;
        }

        .log-tick-num {
            font-size: 11px;
            font-weight: 700;
            color: #a78bfa;
            min-width: 40px;
            padding-top: 1px;
        }

        .log-entry-body {
            flex: 1;
        }

        .log-msg {
            font-size: 13px;
            color: #d1d5db;
        }

        .log-time {
            font-size: 11px;
            color: #4b5563;
            margin-top: 1px;
            font-variant-numeric: tabular-nums;
        }

        .log-done-entry {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 16px;
            background: rgba(99, 102, 241, 0.08);
            border-top: 1px solid rgba(99, 102, 241, 0.15);
        }

        .log-done-icon {
            font-size: 16px;
        }

        .log-done-text {
            font-size: 13px;
            font-weight: 600;
            color: #818cf8;
        }
    </style>

<body>
    <div id="app">
        <div class="header">
            <span class="header-icon">⏱</span>
            <h1 class="header-title">Clock Timer</h1>
        </div>

        <div class="tick-display">
            <div class="tick-counter" id="tick-counter">0</div>
            <div class="tick-of" id="tick-of">/ 10 ticks</div>

            <div class="progress-container">
                <div class="progress-track">
                    <div class="progress-fill" id="progress-fill"></div>
                </div>
                <div class="progress-meta">
                    <span class="progress-pct" id="progress-pct">0%</span>
                    <span class="progress-message" id="progress-message">Ready to start</span>
                </div>
            </div>

            <div class="status-row">
                <div class="status-dot idle" id="status-dot"></div>
                <span class="status-label" id="status-label">Idle</span>
            </div>
        </div>

        <div class="controls-card">
            <div class="controls-title">Configuration</div>
            <div class="control-grid">
                <div class="control-group">
                    <label class="control-label" for="ticks-input">Number of Ticks</label>
                    <input
                        type="number"
                        id="ticks-input"
                        class="control-input"
                        min="1"
                        max="30"
                        value="10"
                        placeholder="1–30"
                    />
                    <span class="control-hint">Max 30 ticks</span>
                </div>
                <div class="control-group">
                    <label class="control-label" for="interval-input">Interval (seconds)</label>
                    <input
                        type="number"
                        id="interval-input"
                        class="control-input"
                        min="0.1"
                        max="30"
                        step="0.1"
                        value="1"
                        placeholder="0.1–30"
                    />
                    <span class="control-hint">Seconds per tick</span>
                </div>
            </div>
            <button class="start-btn ready" id="start-btn">▶ Start Clock</button>
        </div>

        <div class="log-card">
            <div class="log-header">
                <span class="log-title">Tick Log</span>
                <button class="log-clear" id="clear-btn">Clear</button>
            </div>
            <div class="log-list" id="log-list">
                <div class="log-empty" id="log-empty">No ticks yet — start the clock to see progress notifications</div>
            </div>
        </div>
    </div>

</body>
</html>
