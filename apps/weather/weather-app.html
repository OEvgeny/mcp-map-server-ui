<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>
    <style>
        .fallback-theme {
            --color-background-primary: #292929;
            --color-background-secondary: #1f1f1f;
            --color-background-tertiary: #141414;
            --color-background-inverse: #ffffff;
            --color-background-ghost: transparent;
            --color-background-info: #1a1f5b;
            --color-background-danger: #3b0509;
            --color-background-success: #052505;
            --color-background-warning: #4a1e04;
            --color-background-disabled: #141414;
            --color-text-primary: #ffffff;
            --color-text-secondary: #d6d6d6;
            --color-text-tertiary: #adadad;
            --color-text-inverse: #242424;
            --color-text-info: #5661d4;
            --color-text-danger: #dc626d;
            --color-text-success: #54b054;
            --color-text-warning: #faa06b;
            --color-text-disabled: #5c5c5c;
            --color-text-ghost: #999999;
            --color-border-primary: #666666;
            --color-border-secondary: #525252;
            --color-border-tertiary: #3d3d3d;
            --color-border-inverse: #292929;
            --color-border-ghost: #0a0a0a;
            --color-border-info: #5661d4;
            --color-border-danger: #c50f1f;
            --color-border-success: #107c10;
            --color-border-warning: #f7630c;
            --color-border-disabled: #424242;
            --color-ring-primary: #ffffff;
            --color-ring-secondary: #adadad;
            --color-ring-inverse: #000000;
            --color-ring-info: #5661d4;
            --color-ring-danger: #dc626d;
            --color-ring-success: #54b054;
            --color-ring-warning: #faa06b;
            --font-sans: "Segoe UI", "Segoe UI Web (West European)", -apple-system, BlinkMacSystemFont, Roboto, "Helvetica Neue", sans-serif;
            --font-mono: Consolas, "Courier New", Courier, monospace;
            --font-weight-normal: 400;
            --font-weight-medium: 500;
            --font-weight-semibold: 600;
            --font-weight-bold: 700;
            --font-text-xs-size: 10px;
            --font-text-sm-size: 12px;
            --font-text-md-size: 14px;
            --font-text-lg-size: 16px;
            --font-heading-xs-size: 20px;
            --font-heading-sm-size: 24px;
            --font-heading-md-size: 28px;
            --font-heading-lg-size: 32px;
            --font-heading-xl-size: 40px;
            --font-heading-2xl-size: 68px;
            --font-heading-3xl-size: 68px;
            --font-text-xs-line-height: 14px;
            --font-text-sm-line-height: 16px;
            --font-text-md-line-height: 20px;
            --font-text-lg-line-height: 22px;
            --font-heading-xs-line-height: 28px;
            --font-heading-sm-line-height: 32px;
            --font-heading-md-line-height: 36px;
            --font-heading-lg-line-height: 40px;
            --font-heading-xl-line-height: 52px;
            --font-heading-2xl-line-height: 92px;
            --font-heading-3xl-line-height: 92px;
            --border-radius-xs: 2px;
            --border-radius-sm: 4px;
            --border-radius-md: 6px;
            --border-radius-lg: 8px;
            --border-radius-xl: 12px;
            --border-radius-full: 10000px;
            --border-width-regular: 1px;
            --shadow-hairline: 0 0 2px rgba(0,0,0,0.24), 0 1px 2px rgba(0,0,0,0.28);
            --shadow-sm: 0 0 2px rgba(0,0,0,0.24), 0 2px 4px rgba(0,0,0,0.28);
            --shadow-md: 0 0 2px rgba(0,0,0,0.24), 0 4px 8px rgba(0,0,0,0.28);
            --shadow-lg: 0 0 2px rgba(0,0,0,0.24), 0 8px 16px rgba(0,0,0,0.28);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* Phase 5: Accessibility - Screen reader only */
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border-width: 0;
        }

        /* Phase 5: Accessibility - Focus visible styles */
        *:focus-visible {
            outline: 3px solid var(--color-ring-primary);
            outline-offset: 2px;
            border-radius: var(--border-radius-sm);
        }

        button:focus-visible {
            box-shadow: 0 0 0 3px var(--color-ring-info);
        }

        input:focus-visible {
            border-color: var(--color-border-info);
            box-shadow: 0 0 0 3px var(--color-ring-info);
        }

        html, body {
            width: 100%;
            height: 100%;
            font-family: var(--font-sans);
            background: linear-gradient(135deg, var(--color-background-secondary) 0%, var(--color-background-primary) 100%);
            color: var(--color-text-primary);
            overflow-x: hidden;
            overflow-y: auto;
        }

        #weather-container {
            padding: 8px;
            max-width: 1200px;
            margin: 0 auto;
        }

        #loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--color-background-secondary);
            color: var(--color-text-primary);
            padding: 20px 30px;
            border-radius: var(--border-radius-xl);
            font-size: var(--font-text-lg-size);
            box-shadow: var(--shadow-md);
            z-index: 1001;
        }

        .location-header {
            text-align: center;
            color: var(--color-text-primary);
            margin-bottom: 8px;
        }

        .location-header h1 {
            font-size: var(--font-heading-xs-size);
            font-weight: var(--font-weight-bold);
            margin-bottom: 2px;
        }

        .location-header p {
            font-size: var(--font-text-sm-size);
            opacity: 0.9;
        }

        .favorite-btn {
            background: color-mix(in srgb, var(--color-background-inverse) 20%, transparent);
            border: 2px solid color-mix(in srgb, var(--color-border-primary) 60%, transparent);
            border-radius: var(--border-radius-full);
            width: 32px;
            height: 32px;
            font-size: 1.2rem;
            color: var(--color-text-primary);
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
        }

        .favorite-btn:hover {
            background: color-mix(in srgb, var(--color-background-inverse) 30%, transparent);
            border-color: color-mix(in srgb, var(--color-border-primary) 80%, transparent);
            transform: scale(1.1);
        }

        .current-weather {
            background: linear-gradient(135deg, var(--color-background-secondary), var(--color-background-tertiary));
            border-radius: var(--border-radius-lg);
            padding: 12px 16px;
            margin-bottom: 10px;
            box-shadow: var(--shadow-md);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .current-main {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .weather-icon-large {
            font-size: 60px;
            line-height: 1;
        }

        .current-temp {
            font-size: 2.8rem;
            font-weight: var(--font-weight-bold);
            color: var(--color-text-primary);
            line-height: 1;
        }

        .current-condition {
            font-size: 1rem;
            color: var(--color-text-secondary);
            margin-top: 4px;
        }

        .current-details {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .detail-item {
            text-align: center;
        }

        .detail-label {
            font-size: 0.75rem;
            color: var(--color-text-tertiary);
            margin-bottom: 3px;
        }

        .detail-value {
            font-size: 1.2rem;
            font-weight: var(--font-weight-semibold);
            color: var(--color-text-primary);
        }

        .forecast-section {
            margin-top: 10px;
        }

        .forecast-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .forecast-title {
            color: var(--color-text-primary);
            font-size: 1.2rem;
            font-weight: var(--font-weight-semibold);
            margin: 0;
        }

        .forecast-toggle {
            background: color-mix(in srgb, var(--color-background-inverse) 10%, transparent);
            color: var(--color-text-primary);
            border: 2px solid color-mix(in srgb, var(--color-border-primary) 60%, transparent);
            border-radius: var(--border-radius-md);
            padding: 6px 12px;
            font-size: 0.85rem;
            font-weight: var(--font-weight-semibold);
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .forecast-toggle:hover {
            background: color-mix(in srgb, var(--color-background-inverse) 20%, transparent);
            border-color: color-mix(in srgb, var(--color-border-primary) 80%, transparent);
        }

        .forecast-content {
            display: none;
            animation: slideDown 0.3s ease-out;
        }

        .forecast-content.visible {
            display: block;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .forecast-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
        }

        .forecast-card {
            background: var(--color-background-secondary);
            border-radius: var(--border-radius-md);
            padding: 6px 3px;
            text-align: center;
            box-shadow: var(--shadow-sm);
            transition: transform 0.2s, box-shadow 0.2s;
            min-width: 0;
        }

        .forecast-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .forecast-day {
            font-size: 0.7rem;
            font-weight: var(--font-weight-semibold);
            color: var(--color-text-primary);
            margin-bottom: 3px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .forecast-icon {
            font-size: 28px;
            margin: 3px 0;
            line-height: 1;
        }

        .forecast-temps {
            display: flex;
            justify-content: center;
            gap: 3px;
            margin-top: 3px;
        }

        .temp-high {
            font-size: 0.95rem;
            font-weight: var(--font-weight-bold);
            color: var(--color-text-warning);
        }

        .temp-low {
            font-size: 0.95rem;
            font-weight: var(--font-weight-semibold);
            color: var(--color-text-info);
        }

        .forecast-condition {
            font-size: 0.7rem;
            color: var(--color-text-tertiary);
            margin-top: 3px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Comparison Mode Styles */
        .comparison-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            color: var(--color-text-primary);
            padding: 0 10px;
        }

        .comparison-header h1 {
            margin: 0;
            font-size: 2rem;
        }

        .comparison-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            padding: 10px;
        }

        .comparison-card {
            background: linear-gradient(135deg, var(--color-background-secondary), var(--color-background-tertiary));
            border-radius: var(--border-radius-xl);
            padding: 20px;
            box-shadow: var(--shadow-md);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .comparison-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
        }

        .comparison-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
        }

        .comparison-card-header h2 {
            margin: 0;
            font-size: 1.5rem;
            color: var(--color-text-primary);
            flex: 1;
        }

        .comparison-card-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .comparison-coords {
            font-size: 0.9rem;
            color: var(--color-text-secondary);
            margin: 0 0 16px 0;
        }

        .remove-location-btn {
            background: var(--color-background-danger);
            border: none;
            color: var(--color-text-danger);
            font-size: 1.5rem;
            width: 32px;
            height: 32px;
            border-radius: var(--border-radius-full);
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            line-height: 1;
        }

        .remove-location-btn:hover {
            background: var(--color-border-danger);
            color: var(--color-text-primary);
            transform: scale(1.1);
        }

        .current-weather-compact {
            text-align: center;
            margin-bottom: 20px;
            padding: 16px;
            background: var(--color-background-tertiary);
            border-radius: var(--border-radius-xl);
        }

        .current-temp-large {
            font-size: 2.5rem;
            font-weight: var(--font-weight-bold);
            color: var(--color-text-primary);
            margin: 8px 0;
        }

        .comparison-stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .stat {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 12px;
            background: var(--color-background-tertiary);
            border-radius: var(--border-radius-lg);
            transition: background 0.2s;
        }

        .stat:hover {
            background: var(--color-background-secondary);
        }

        .stat-label {
            font-size: 0.85rem;
            color: var(--color-text-tertiary);
            margin-bottom: 4px;
            font-weight: var(--font-weight-medium);
        }

        .stat-value {
            font-size: 1.2rem;
            font-weight: var(--font-weight-semibold);
            color: var(--color-text-primary);
        }

        .error-message {
            background: var(--color-background-secondary);
            border-radius: var(--border-radius-xl);
            padding: 30px;
            text-align: center;
            color: var(--color-text-danger);
            font-size: 1.2rem;
        }

        /* Interactive Controls */
        .controls-section {
            background: var(--color-background-secondary);
            border-radius: var(--border-radius-lg);
            padding: 12px;
            margin-bottom: 12px;
            box-shadow: var(--shadow-sm);
        }

        .search-container {
            display: flex;
            flex-wrap: nowrap;
            gap: 8px;
            margin-bottom: 10px;
            align-items: center;
        }

        .search-input {
            flex: 1 1 auto;
            min-width: 200px;
            padding: 10px 14px;
            border: 2px solid var(--color-border-secondary);
            border-radius: var(--border-radius-lg);
            font-size: 1rem;
            transition: border-color 0.2s;
            background: var(--color-background-tertiary);
            color: var(--color-text-primary);
        }

        .search-input:focus {
            outline: none;
            border-color: var(--color-border-info);
        }

        .btn {
            padding: 10px 14px;
            border: none;
            border-radius: var(--border-radius-md);
            font-size: var(--font-text-sm-size);
            font-weight: var(--font-weight-semibold);
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            flex: 0 0 auto;
            white-space: nowrap;
            color: var(--color-text-primary);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-primary {
            background: var(--color-background-info);
            color: var(--color-text-primary);
        }

        #stream-btn {
            background: linear-gradient(135deg, var(--color-background-success), var(--color-border-success));
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .btn-secondary {
            background: var(--color-background-ghost);
            color: var(--color-text-secondary);
            border: 2px solid var(--color-border-primary);
        }

        .btn-secondary:hover:not(:disabled) {
            background: var(--color-background-secondary);
            color: var(--color-text-primary);
        }

        #history-dropdown-btn {
            min-width: auto;
            width: auto;
            padding: 10px 14px;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        #history-dropdown-btn:hover {
            transform: translateY(-2px);
        }

        #history-dropdown-btn[aria-expanded="true"] #history-arrow {
            transform: rotate(180deg);
        }

        #history-arrow {
            display: inline-block;
            transition: transform 0.3s ease;
        }

        .quick-cities {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 10px;
        }

        .city-chip {
            padding: 6px 12px;
            background: var(--color-background-tertiary);
            color: var(--color-text-secondary);
            border: 1px solid var(--color-border-secondary);
            border-radius: var(--border-radius-full);
            font-size: 0.8rem;
            font-weight: var(--font-weight-medium);
            cursor: pointer;
            transition: all 0.2s;
        }

        .city-chip:hover {
            background: var(--color-background-info);
            color: var(--color-text-primary);
            transform: translateY(-2px);
        }

        .action-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        /* Logging Panel */
        .logging-section {
            background: var(--color-background-tertiary);
            border-radius: var(--border-radius-xl);
            margin-top: 12px;
            overflow: hidden;
            box-shadow: var(--shadow-lg);
        }

        .logging-header {
            padding: 10px 16px;
            background: var(--color-background-secondary);
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            user-select: none;
        }

        .logging-title {
            color: var(--color-text-primary);
            font-size: 1rem;
            font-weight: var(--font-weight-semibold);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logging-toggle {
            color: var(--color-text-primary);
            font-size: 1.2rem;
        }

        .logging-content {
            padding: 15px 20px;
            max-height: 300px;
            overflow-y: auto;
            font-family: var(--font-mono);
            font-size: 0.85rem;
        }

        .logging-content.collapsed {
            display: none;
        }

        .log-entry {
            margin-bottom: 8px;
            padding: 8px;
            border-radius: 4px;
            line-height: 1.4;
        }

        .log-info {
            color: var(--color-text-success);
            background: var(--color-background-success);
        }

        .log-warn {
            color: var(--color-text-warning);
            background: var(--color-background-warning);
        }

        .log-error {
            color: var(--color-text-danger);
            background: var(--color-background-danger);
        }

        .log-time {
            color: var(--color-text-ghost);
            margin-right: 10px;
        }

        .loading-spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid var(--color-border-secondary);
            border-top-color: var(--color-text-primary);
            border-radius: var(--border-radius-full);
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Display Mode Controls */
        .display-controls {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 1000;
            display: flex;
            gap: 8px;
        }

        .mode-btn {
            background: var(--color-background-tertiary);
            border: none;
            border-radius: var(--border-radius-md);
            width: 36px;
            height: 36px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
            color: var(--color-text-primary);
        }

        .mode-btn:hover:not(:disabled) {
            background: var(--color-background-secondary);
        }

        .mode-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .mode-btn svg {
            width: 20px;
            height: 20px;
            fill: var(--color-text-primary);
        }

        /* Theme adaptations */
        body.theme-light {
            background: var(--color-background-primary);
        }

        body.theme-dark {
            background: var(--color-background-secondary);
        }

        /* PiP mode - minimal compact layout */
        body.mode-pip {
            font-size: 0.85rem;
        }

        body.mode-pip .controls-section {
            padding: 10px;
        }

        body.mode-pip .search-container {
            display: none;
        }

        body.mode-pip .quick-cities {
            display: none;
        }

        body.mode-pip .action-buttons {
            display: none;
        }

        body.mode-pip .logging-section {
            display: none;
        }

        body.mode-pip .location-header h1 {
            font-size: 1.5rem;
        }

        body.mode-pip .current-temp {
            font-size: 3rem;
        }

        body.mode-pip .forecast-section {
            display: none;
        }

        /* Fullscreen mode - expanded layout */
        body.mode-fullscreen .current-weather {
            padding: 50px;
        }

        body.mode-fullscreen .forecast-card {
            padding: 20px 12px;
        }

        @media (max-width: 768px) {
            .location-header h1 {
                font-size: 2rem;
            }

            .current-weather {
                flex-direction: column;
                padding: 30px 20px;
            }

            .current-main {
                flex-direction: column;
                gap: 20px;
            }

            .current-temp {
                font-size: 4rem;
            }

            .current-details {
                grid-template-columns: repeat(2, 1fr);
                width: 100%;
            }

            .forecast-grid {
                grid-template-columns: repeat(auto-fit, minmax(90px, 1fr));
                gap: 6px;
            }

            .forecast-card {
                padding: 10px 6px;
            }

            .forecast-icon {
                font-size: 32px;
            }

            /* Make current weather card more compact on mobile */
            .current-weather {
                padding: 10px 12px;
                margin-bottom: 8px;
            }

            .current-main {
                gap: 12px;
            }

            .weather-icon-large {
                font-size: 48px;
            }

            .current-temp {
                font-size: 2.2rem;
            }

            .current-condition {
                font-size: 0.9rem;
                margin-top: 2px;
            }

            .current-details {
                gap: 8px;
            }

            .detail-label {
                font-size: 0.7rem;
                margin-bottom: 2px;
            }

            .detail-value {
                font-size: 1rem;
            }

            .location-header {
                margin-bottom: 6px;
            }

            .location-header h1 {
                font-size: 1.3rem;
            }

            .location-header p {
                font-size: 0.8rem;
            }

            /* Removed flex-direction: column to keep search elements on one row */

            .action-buttons {
                flex-direction: column;
            }

            .btn.action-btn {
                width: 100%;
                justify-content: center;
            }
        }

        /* Insights Modal */
        .insights-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: color-mix(in srgb, var(--color-background-primary) 85%, transparent);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            animation: fadeIn 0.2s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .insights-content {
            background: var(--color-background-secondary);
            border-radius: var(--border-radius-xl);
            max-width: 800px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: var(--shadow-lg);
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from {
                transform: translateY(30px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .insights-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 24px;
            border-bottom: 2px solid var(--color-border-tertiary);
            background: linear-gradient(135deg, var(--color-background-info) 0%, var(--color-background-secondary) 100%);
            color: var(--color-text-primary);
            border-radius: var(--border-radius-xl) var(--border-radius-xl) 0 0;
        }

        .insights-header h2 {
            margin: 0;
            font-size: 1.5rem;
        }

        .close-insights {
            background: color-mix(in srgb, var(--color-background-inverse) 15%, transparent);
            border: none;
            color: var(--color-text-primary);
            font-size: 2rem;
            width: 40px;
            height: 40px;
            border-radius: var(--border-radius-full);
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }

        .close-insights:hover {
            background: color-mix(in srgb, var(--color-background-inverse) 25%, transparent);
            transform: scale(1.1);
        }

        .close-bookmark {
            background: color-mix(in srgb, var(--color-background-inverse) 15%, transparent);
            border: none;
            color: var(--color-text-primary);
            font-size: 2rem;
            width: 40px;
            height: 40px;
            border-radius: var(--border-radius-full);
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }

        .close-bookmark:hover {
            background: color-mix(in srgb, var(--color-background-inverse) 25%, transparent);
            transform: scale(1.1);
        }

        .bookmark-save-btn, .bookmark-cancel-btn, .bookmark-delete-btn {
            padding: 10px 20px;
            border-radius: var(--border-radius-lg);
            font-size: var(--font-text-md-size);
            font-weight: var(--font-weight-semibold);
            cursor: pointer;
            transition: all 0.2s;
            border: none;
        }

        .bookmark-save-btn {
            background: var(--color-background-info);
            color: var(--color-text-primary);
        }

        .bookmark-save-btn:hover {
            background: var(--color-border-info);
            transform: translateY(-1px);
            box-shadow: var(--shadow-md);
        }

        .bookmark-cancel-btn {
            background: var(--color-background-tertiary);
            color: var(--color-text-secondary);
        }

        .bookmark-cancel-btn:hover {
            background: var(--color-background-secondary);
        }

        .bookmark-delete-btn {
            background: var(--color-background-danger);
            color: var(--color-text-primary);
        }

        .bookmark-delete-btn:hover {
            background: var(--color-border-danger);
            transform: translateY(-1px);
            box-shadow: var(--shadow-md);
        }

        .insights-body {
            padding: 24px;
        }

        .insight-section {
            margin-bottom: 24px;
            padding: 16px;
            background: var(--color-background-tertiary);
            border-radius: var(--border-radius-xl);
            border-left: 4px solid var(--color-border-info);
        }

        .insight-section h3 {
            margin: 0 0 12px 0;
            color: var(--color-text-primary);
            font-size: 1.1rem;
        }

        .insight-section p {
            margin: 8px 0;
            color: var(--color-text-secondary);
        }

        .insight-section ul {
            margin: 8px 0;
            padding-left: 20px;
        }

        .conditions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 12px;
        }

        .conditions-grid div {
            padding: 8px;
            background: var(--color-background-secondary);
            border-radius: var(--border-radius-lg);
            font-size: 0.9rem;
        }

        .pattern-item {
            padding: 10px;
            background: var(--color-background-secondary);
            border-radius: var(--border-radius-lg);
            margin: 8px 0;
        }

        .pattern-item .confidence {
            color: var(--color-text-info);
            font-size: 0.85rem;
            margin-left: 8px;
        }

        .alerts {
            border-left-color: var(--color-border-warning);
        }

        .alert-item {
            padding: 12px;
            background: var(--color-background-secondary);
            border-radius: var(--border-radius-lg);
            margin: 8px 0;
            border-left: 4px solid var(--color-border-warning);
        }

        .alert-item.severity-high {
            border-left-color: var(--color-border-danger);
            background: var(--color-background-danger);
        }

        .alert-item.severity-medium {
            border-left-color: var(--color-border-warning);
            background: var(--color-background-warning);
        }

        .alert-item.severity-low {
            border-left-color: var(--color-border-info);
            background: var(--color-background-info);
        }

        .recommendation {
            padding: 10px;
            background: var(--color-background-secondary);
            border-radius: var(--border-radius-lg);
            margin: 8px 0;
            border-left: 4px solid var(--color-border-success);
        }

        .recommendation.priority-high {
            border-left-color: var(--color-border-danger);
        }

        .recommendation.priority-medium {
            border-left-color: var(--color-border-warning);
        }

        @media (max-width: 600px) {
            .insights-modal {
                padding: 10px;
            }

            .insights-content {
                max-height: 95vh;
            }

            .insights-header {
                padding: 16px 20px;
            }

            .insights-header h2 {
                font-size: 1.2rem;
            }

            .insights-body {
                padding: 16px;
            }

            .conditions-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Progressive Streaming Styles */
        .stream-info {
            background: var(--color-background-success);
            border: 2px solid var(--color-border-success);
            border-radius: var(--border-radius-lg);
            padding: 12px;
            margin-bottom: 20px;
        }

        .stream-info code {
            background: color-mix(in srgb, var(--color-background-success) 70%, transparent);
            padding: 2px 6px;
            border-radius: var(--border-radius-sm);
            font-family: var(--font-mono);
            font-size: 0.85rem;
            color: var(--color-text-success);
        }

        .stream-progress {
            margin-bottom: 24px;
        }

        .progress-bar {
            width: 100%;
            height: 24px;
            background: var(--color-background-tertiary);
            border-radius: var(--border-radius-xl);
            overflow: hidden;
            margin-bottom: 8px;
            box-shadow: var(--shadow-hairline);
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--color-border-success), var(--color-text-success));
            transition: width 0.5s ease-out;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 8px;
            color: var(--color-text-primary);
            font-weight: var(--font-weight-semibold);
            font-size: 0.75rem;
        }

        #progress-text {
            text-align: center;
            color: var(--color-text-secondary);
            font-weight: var(--font-weight-semibold);
            font-size: 0.95rem;
        }

        .stream-phases {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .stream-phase {
            background: var(--color-background-secondary);
            border-radius: var(--border-radius-xl);
            border: 2px solid var(--color-border-tertiary);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
        }

        .phase-header {
            background: linear-gradient(135deg, var(--color-background-success), var(--color-border-success));
            color: var(--color-text-primary);
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .phase-header h3 {
            margin: 0;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .phase-badge {
            background: color-mix(in srgb, var(--color-background-inverse) 20%, transparent);
            padding: 4px 10px;
            border-radius: var(--border-radius-xl);
            font-size: 0.75rem;
            font-weight: var(--font-weight-bold);
        }

        .phase-timestamp {
            font-size: 0.85rem;
            opacity: 0.9;
            font-family: var(--font-mono);
        }

        .phase-body {
            padding: 16px;
        }

        .phase-body h4 {
            color: var(--color-text-success);
            margin: 12px 0 8px 0;
            font-size: 0.95rem;
        }

        .phase-body ul {
            margin: 8px 0;
            padding-left: 20px;
        }

        .phase-body li {
            margin: 6px 0;
            color: var(--color-text-secondary);
        }

        .data-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 10px;
            margin: 12px 0;
        }

        .data-grid div {
            background: var(--color-background-tertiary);
            padding: 10px;
            border-radius: var(--border-radius-lg);
            border: 1px solid var(--color-border-tertiary);
            font-size: 0.9rem;
        }

        .forecast-mini {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 10px;
            margin: 12px 0;
        }

        .forecast-day-mini {
            background: var(--color-background-tertiary);
            padding: 10px;
            border-radius: var(--border-radius-lg);
            border: 1px solid var(--color-border-tertiary);
            text-align: center;
            font-size: 0.85rem;
        }

        .forecast-day-mini strong {
            color: var(--color-text-success);
        }

        @media (max-width: 600px) {
            .stream-info {
                padding: 10px;
            }

            .phase-header {
                flex-direction: column;
                gap: 8px;
                align-items: flex-start;
            }

            .phase-timestamp {
                align-self: flex-end;
            }

            .data-grid {
                grid-template-columns: 1fr;
            }

            .forecast-mini {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        /* Phase 4: Keyboard Shortcuts - Search History Dropdown */
        .search-container {
            position: relative;
        }

        .search-history-dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            margin-top: 4px;
            background: var(--color-background-secondary);
            border-radius: var(--border-radius-xl);
            box-shadow: var(--shadow-lg);
            z-index: 1000;
            max-height: 400px;
            overflow: hidden;
            animation: slideDown 0.2s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .dropdown-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            border-bottom: 1px solid var(--color-border-tertiary);
            background: var(--color-background-tertiary);
        }

        .dropdown-header h3 {
            margin: 0;
            font-size: 0.9rem;
            font-weight: var(--font-weight-semibold);
            color: var(--color-text-tertiary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .close-dropdown {
            background: transparent;
            border: none;
            color: var(--color-text-ghost);
            font-size: 1.3rem;
            width: 24px;
            height: 24px;
            border-radius: var(--border-radius-sm);
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }

        .close-dropdown:hover {
            background: var(--color-background-danger);
            color: var(--color-text-danger);
        }

        .history-list {
            max-height: 320px;
            overflow-y: auto;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            cursor: pointer;
            transition: all 0.2s;
            border-bottom: 1px solid var(--color-border-tertiary);
        }

        .history-item:last-child {
            border-bottom: none;
        }

        .history-item:hover {
            background: var(--color-background-tertiary);
            padding-left: 20px;
        }

        .history-item span:first-child {
            font-weight: var(--font-weight-medium);
            color: var(--color-text-primary);
        }

        .history-time {
            color: var(--color-text-ghost);
            font-size: 0.8rem;
            white-space: nowrap;
            margin-left: 12px;
        }

        /* Phase 4: Keyboard Shortcuts - Shortcuts Help Modal */
        .shortcuts-table {
            width: 100%;
            border-collapse: collapse;
        }

        .shortcuts-table th {
            background: var(--color-background-tertiary);
            padding: 12px;
            text-align: left;
            font-weight: var(--font-weight-semibold);
            color: var(--color-text-primary);
        }

        .shortcuts-table td {
            padding: 10px 12px;
            border-bottom: 1px solid var(--color-border-tertiary);
        }

        .shortcuts-table tbody tr:last-child td {
            border-bottom: none;
        }

        .shortcuts-table kbd {
            background: var(--color-background-tertiary);
            padding: 4px 8px;
            border-radius: var(--border-radius-sm);
            font-family: var(--font-mono);
            font-size: 0.9rem;
            border: 1px solid var(--color-border-secondary);
            box-shadow: var(--shadow-hairline);
        }

        @media (max-width: 600px) {
            .search-history-dropdown {
                min-width: 90%;
                max-width: 90%;
            }

            .shortcuts-table {
                font-size: 0.9rem;
            }

            .shortcuts-table kbd {
                font-size: 0.8rem;
                padding: 3px 6px;
            }
        }

        /* Tools List Changed Notification */
        .tools-notification {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 10000;
            animation: slideInRight 0.3s ease-out;
            transition: opacity 0.3s ease;
        }

        .notification-content {
            display: flex;
            align-items: center;
            gap: 12px;
            background: linear-gradient(135deg, var(--color-background-info) 0%, var(--color-background-secondary) 100%);
            color: var(--color-text-primary);
            padding: 16px 20px;
            border-radius: var(--border-radius-xl);
            box-shadow: var(--shadow-lg);
            min-width: 320px;
            max-width: 400px;
        }

        .notification-icon {
            font-size: 1.5rem;
            flex-shrink: 0;
        }

        .notification-text {
            flex: 1;
            font-size: 0.95rem;
            line-height: 1.4;
        }

        .notification-close {
            background: color-mix(in srgb, var(--color-background-inverse) 15%, transparent);
            border: none;
            color: var(--color-text-primary);
            font-size: 1.5rem;
            width: 32px;
            height: 32px;
            border-radius: var(--border-radius-full);
            cursor: pointer;
            transition: all 0.2s;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            line-height: 1;
        }

        .notification-close:hover {
            background: color-mix(in srgb, var(--color-background-inverse) 25%, transparent);
            transform: scale(1.1);
        }

        @keyframes slideInRight {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @media (max-width: 600px) {
            .tools-notification {
                top: 10px;
                right: 10px;
                left: 10px;
            }

            .notification-content {
                min-width: auto;
                max-width: none;
            }

            .search-container {
                gap: 6px;
            }

            .search-input {
                font-size: 0.9rem;
                padding: 8px 10px;
            }

            .btn {
                padding: 8px 10px;
                font-size: 0.85rem;
                gap: 4px;
            }

            #history-dropdown-btn {
                padding: 8px 10px;
            }
        }

        /* Very small screens - wrap buttons to next row */
        @media (max-width: 500px) {
            .search-container {
                flex-wrap: wrap;
            }

            .search-input {
                flex: 1 1 100%;
                min-width: 100%;
            }

            .btn {
                flex: 1 1 auto;
            }

            #history-dropdown-btn {
                flex: 0 0 auto;
                min-width: 44px;
            }
        }

        /* Inline style replacements (from weather-app.ts) */
        #weather-container {
            display: none;
        }

        #fullscreen-btn {
            display: none;
        }

        #compress-icon {
            display: none;
        }

        #log-count {
            opacity: 0.7;
            font-size: 0.85rem;
            color: var(--color-text-ghost);
        }

        .location-header-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .comparison-exit-message {
            text-align: center;
            padding: 40px;
            color: var(--color-text-primary);
        }

        .history-empty {
            padding: 20px;
            text-align: center;
            color: var(--color-text-ghost);
        }

        .insights-content-shortcuts {
            max-width: 600px;
        }

        .insights-content-bookmark {
            max-width: 500px;
        }

        .bookmark-section {
            margin-bottom: 16px;
        }

        .bookmark-location-title {
            margin: 0 0 8px 0;
        }

        .bookmark-location-coords {
            margin: 0;
            color: var(--color-text-tertiary);
            font-size: var(--font-text-md-size);
        }

        .bookmark-label {
            display: block;
            margin-bottom: 8px;
            font-weight: var(--font-weight-semibold);
        }

        .bookmark-textarea {
            width: 100%;
            min-height: 100px;
            padding: 12px;
            border: 2px solid var(--color-border-secondary);
            border-radius: var(--border-radius-lg);
            font-family: inherit;
            font-size: var(--font-text-md-size);
            resize: vertical;
            background: var(--color-background-tertiary);
            color: var(--color-text-primary);
        }

        .bookmark-actions {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }

        .bookmark-delete-spacer {
            margin-right: auto;
        }

        .bookmark-meta {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--color-border-tertiary);
            font-size: var(--font-text-sm-size);
            color: var(--color-text-ghost);
        }

        .insights-header-success {
            background: linear-gradient(135deg, var(--color-background-success) 0%, var(--color-border-success) 100%);
        }

        .progress-fill {
            width: 0%;
        }

        .stream-phase-animate {
            animation: slideUp 0.4s ease-out;
        }

        .stream-progress-complete {
            color: var(--color-text-success);
            font-weight: var(--font-weight-bold);
        }
    </style>
</head>
<body>
    <div id="loading">Loading weather data...</div>
    <div id="weather-container">
        <!-- Display mode controls -->
        <div class="display-controls">
            <button id="fullscreen-btn" class="mode-btn" aria-label="Toggle fullscreen mode" aria-pressed="false" aria-keyshortcuts="Control+Enter" title="Toggle fullscreen">
                <svg id="expand-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
                <svg id="compress-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M5 16h3v3h2v-5H5v2zm3-8H5v2h5V5H8v3zm6 11h2v-3h3v-2h-5v5zm2-11V5h-2v5h5V8h-3z"/></svg>
            </button>
        </div>

        <!-- Controls section will be injected here -->
        <div class="controls-section" role="search" aria-label="Weather location search">
            <div class="search-container">
                <input
                    type="text"
                    id="location-search"
                    class="search-input"
                    placeholder="Search for a city or location..."
                    autocomplete="off"
                    aria-label="Enter city or location name"
                    aria-describedby="search-help"
                >
                <button id="history-dropdown-btn" class="btn btn-secondary" aria-label="Show search history" aria-expanded="false" title="Search history (Ctrl+H)">
                    <span id="history-arrow">▼</span>
                </button>
                <button id="search-btn" class="btn btn-primary" aria-label="Search for weather" aria-busy="false">
                    🔍 Search
                </button>
                <button id="shortcuts-btn" class="btn btn-secondary" aria-label="Show keyboard shortcuts (Ctrl+/)" title="Keyboard shortcuts (Ctrl+/ or F1)">
                    ⌨️ Shortcuts
                </button>
                <span id="search-help" class="sr-only">
                    Type a location and press Enter or click Search button
                </span>
            </div>

            <div class="quick-cities" id="quick-cities">
                <!-- Quick city buttons will be injected here -->
            </div>

            <div class="action-buttons">
                <button id="tell-claude-btn" class="btn btn-secondary" aria-label="Send current weather to chat">
                    💬 Tell Claude
                </button>
                <button id="open-web-btn" class="btn btn-secondary" aria-label="Open Weather.com in browser">
                    🌐 View on Weather.com
                </button>
                <button id="stream-btn" class="btn btn-primary" aria-label="View progressive weather analysis">
                    🌊 Stream Analysis
                </button>
            </div>
        </div>

        <!-- Weather content will be injected here -->
        <div id="weather-content"></div>

        <!-- Logging panel -->
        <div class="logging-section">
            <div class="logging-header" id="logging-header" role="button" aria-expanded="false" aria-controls="logging-content" tabindex="0">
                <div class="logging-title">
                    📝 Activity Log
                    <span id="log-count"></span>
                </div>
