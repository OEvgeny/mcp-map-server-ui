<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CesiumJS Globe</title>
    <!-- CesiumJS is loaded dynamically from CDN in mcp-app.ts because static
         <script src=""> tags don't work in srcdoc iframes -->
    <style>
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: transparent;
        }
        #cesiumContainer {
            width: 100%;
            height: 100%;
        }
        .btn {
            position: absolute;
            background: rgba(0, 0, 0, 0.7);
            border: none;
            border-radius: 6px;
            cursor: pointer;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
            color: white;
        }
        .btn:hover {
            background: rgba(0, 0, 0, 0.85);
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        #fullscreen-btn {
            top: 10px;
            right: 10px;
            width: 36px;
            height: 36px;
            display: none;
        }
        #fullscreen-btn svg {
            width: 20px;
            height: 20px;
            fill: white;
        }
        #shuffle-btn {
            top: 10px;
            left: 10px;
            padding: 8px 16px;
            font-size: 14px;
            font-weight: 500;
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 20px 30px;
            border-radius: 8px;
            font-size: 16px;
            z-index: 1001;
        }
        /* Tools List Changed Notification */
        .tools-notification {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 10000;
            animation: slideInRight 0.3s ease-out;
            transition: opacity 0.3s ease;
        }
        @keyframes slideInRight {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        .notification-content {
            display: flex;
            align-items: center;
            gap: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 16px 20px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(102, 126, 234, 0.4);
            min-width: 320px;
            max-width: 400px;
        }
        .notification-icon {
            font-size: 28px;
            flex-shrink: 0;
            animation: spin 2s linear infinite;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .notification-body {
            flex: 1;
        }
        .notification-title {
            font-weight: 600;
            font-size: 16px;
            margin-bottom: 4px;
        }
        .notification-message {
            font-size: 14px;
            opacity: 0.95;
        }
        .notification-close {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            font-size: 24px;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
            flex-shrink: 0;
            line-height: 1;
            padding: 0;
        }
        .notification-close:hover {
            background: rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body>
    <div id="cesiumContainer"></div>
    <button id="shuffle-btn" class="btn" title="Show a random city">Shuffle</button>
    <button id="fullscreen-btn" class="btn" title="Toggle fullscreen">
        <!-- Expand icon (shown when inline) -->
        <svg id="expand-icon" viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
        <!-- Compress icon (shown when fullscreen) -->
        <svg id="compress-icon" style="display:none" viewBox="0 0 24 24"><path d="M5 16h3v3h2v-5H5v2zm3-8H5v2h5V5H8v3zm6 11h2v-3h3v-2h-5v5zm2-11V5h-2v5h5V8h-3z"/></svg>
    </button>
    <div id="loading">Loading globe...</div>
    <script type="module" src="/src/mcp-app.ts"></script>
</body>
</html>
